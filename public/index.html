<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Planner — Sign In</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg class="app-logo-svg" viewBox="0 0 60 60" width="48" height="48" aria-hidden="true">
        <circle cx="30" cy="30" r="28" fill="none" stroke="#0052cc" stroke-width="3"/>
        <circle cx="30" cy="30" r="16" fill="none" stroke="#0052cc" stroke-width="2" opacity="0.5"/>
        <circle cx="30" cy="30" r="6" fill="#0052cc"/>
      </svg>
      <h1>Circular Planner</h1>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <form id="login-form" class="auth-form">
      <div id="login-error" class="form-error hidden"></div>
      <label>
        Email
        <input type="email" id="login-email" autocomplete="email" required>
      </label>
      <label>
        Password
        <input type="password" id="login-password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div id="gitlab-sso-section" class="hidden">
      <div class="auth-divider"><span>or</span></div>
      <a id="gitlab-signin-btn" href="/api/auth/gitlab/authorize" class="btn btn-gitlab btn-full">
        <svg viewBox="0 0 380 380" width="16" height="16" aria-hidden="true" style="flex-shrink:0">
          <path fill="currentColor" d="M282.83 170.73l-11.84-36.43-23.68-72.87a1.25 1.25 0 00-2.38 0l-23.68 72.87H158.75l-23.68-72.87a1.25 1.25 0 00-2.38 0L109 134.3l-11.84 36.43a2.5 2.5 0 00.91 2.8l91.93 66.79 91.93-66.79a2.5 2.5 0 00.9-2.8z"/>
        </svg>
        Sign in with GitLab
      </a>
    </div>

    <form id="register-form" class="auth-form hidden">
      <div id="register-error" class="form-error hidden"></div>
      <label>
        Username
        <input type="text" id="reg-username" autocomplete="username" required>
      </label>
      <label>
        Email
        <input type="email" id="reg-email" autocomplete="email" required>
      </label>
      <label>
        Password <span class="hint">(min 8 characters)</span>
        <input type="password" id="reg-password" autocomplete="new-password" required minlength="8">
      </label>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
  </div>

  <button id="theme-toggle" class="btn-theme" style="position:fixed;top:14px;right:16px;" title="Toggle dark mode">🌙</button>
  <script src="/js/auth-bundle.js"></script>
</body>
</html>
