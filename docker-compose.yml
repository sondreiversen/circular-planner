version: '3.8'

# Default: SQLite (no external DB needed)
# For Postgres: set DATABASE_URL=postgresql://... in .env

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:./data/planner.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./data:/home/planner/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
