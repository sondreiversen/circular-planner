version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: circular_planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d circular_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://planner:planner_secret@db:5432/circular_planner
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3000
      NODE_ENV: production

volumes:
  pgdata:
